name: Release Plugin

on:
  push:
    tags:
      - 'v*' # Trigger the workflow when a tag like v1.0.0 or v1.3.0 is pushed

jobs:
  build_release:
    name: Build and Release ZIPs
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Needed to create the release and upload assets

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version Number
        # Removes the 'v' from the tag (e.g., 'v1.3.0' becomes '1.3.0')
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Build WordPress Plugin ZIPs
        run: |
          # Define file names
          ZIP_NAME="gw-super-mcp-abilities-${{ env.VERSION }}.zip"
          LATEST_ZIP="gw-super-mcp-abilities.zip"
          
          # Create a staging directory with the exact plugin slug name
          mkdir -p /tmp/gw-super-mcp-abilities
          
          # Copy all files into the staging directory, ignoring dev-specific folders
          rsync -av --exclude='.git/' --exclude='.github/' ./ /tmp/gw-super-mcp-abilities/
          
          # Move to the tmp directory and create the ZIP archive
          cd /tmp
          zip -r $ZIP_NAME gw-super-mcp-abilities/
          
          # Create the "living" ZIP that is just named by the plugin slug
          cp $ZIP_NAME $LATEST_ZIP
          
          # Move both ZIP files back into the GitHub workspace for upload
          mv $ZIP_NAME ${{ github.workspace }}/
          mv $LATEST_ZIP ${{ github.workspace }}/

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            gw-super-mcp-abilities-${{ env.VERSION }}.zip
            gw-super-mcp-abilities.zip
          draft: false
          prerelease: false
          generate_release_notes: true # Autogenerates notes based on commits and PRs
